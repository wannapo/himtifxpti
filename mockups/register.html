<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Daftar - LMSColab</title>
    <link rel="preconnect" href="https://fonts.bunny.net">
    <link href="https://fonts.bunny.net/css?family=figtree:400,500,600,700,800&display=swap" rel="stylesheet">
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    fontFamily: { sans: ['Figtree', 'sans-serif'] }
                }
            }
        }
    </script>
</head>
<body class="font-sans text-gray-900 antialiased">
    <div class="min-h-screen flex flex-col sm:justify-center items-center pt-6 sm:pt-0 bg-gray-100">

        <!-- Logo -->
        <div>
            <a href="landing.html" class="flex items-center space-x-2 group">
                <div class="w-12 h-12 bg-blue-600 rounded-lg flex items-center justify-center text-white text-2xl font-bold group-hover:bg-blue-700 transition-colors shadow-sm">L</div>
                <span class="font-bold text-2xl text-slate-800 tracking-tight">LMS<span class="text-blue-600">Colab</span></span>
            </a>
        </div>

        <!-- Register Card -->
        <div class="w-full sm:max-w-md mt-6 px-6 py-8 bg-white shadow-md overflow-hidden sm:rounded-lg">

            <h2 class="text-xl font-bold text-slate-800 mb-6 text-center">Buat Akun Baru</h2>

            <form>
                <!-- Name -->
                <div>
                    <label for="name" class="block font-medium text-sm text-gray-700">Nama Lengkap</label>
                    <input id="name" type="text" name="name" required autofocus autocomplete="name"
                           class="block mt-1 w-full border-gray-300 focus:border-blue-500 focus:ring-blue-500 rounded-md shadow-sm"
                           placeholder="Budi Santoso">
                </div>

                <!-- Email -->
                <div class="mt-4">
                    <label for="email" class="block font-medium text-sm text-gray-700">Email</label>
                    <input id="email" type="email" name="email" required autocomplete="username"
                           class="block mt-1 w-full border-gray-300 focus:border-blue-500 focus:ring-blue-500 rounded-md shadow-sm"
                           placeholder="nama@email.com">
                </div>

                <!-- Password -->
                <div class="mt-4">
                    <label for="password" class="block font-medium text-sm text-gray-700">Password</label>
                    <input id="password" type="password" name="password" required autocomplete="new-password"
                           class="block mt-1 w-full border-gray-300 focus:border-blue-500 focus:ring-blue-500 rounded-md shadow-sm"
                           placeholder="••••••••">
                </div>

                <!-- Confirm Password -->
                <div class="mt-4">
                    <label for="password_confirmation" class="block font-medium text-sm text-gray-700">Konfirmasi Password</label>
                    <input id="password_confirmation" type="password" name="password_confirmation" required autocomplete="new-password"
                           class="block mt-1 w-full border-gray-300 focus:border-blue-500 focus:ring-blue-500 rounded-md shadow-sm"
                           placeholder="••••••••">
                </div>

                <!-- Actions -->
                <div class="flex items-center justify-between mt-6">
                    <div class="text-sm text-gray-600">
                        Sudah punya akun?
                        <a href="login.html" class="font-bold text-blue-600 hover:text-blue-700 underline focus:outline-none">
                            Masuk di sini
                        </a>
                    </div>

                    <button type="button" onclick="window.location.href='login.html'" class="ms-4 inline-flex items-center px-4 py-2 bg-blue-600 border border-transparent rounded-md font-semibold text-xs text-white uppercase tracking-widest hover:bg-blue-700 focus:bg-blue-700 active:bg-blue-800 focus:outline-none focus:ring-2 focus:ring-blue-500 focus:ring-offset-2 transition ease-in-out duration-150">
                        Daftar
                    </button>
                </div>
            </form>
        </div>

        <!-- Footer text -->
        <p class="mt-8 text-center text-xs text-gray-400">&copy; 2026 LMSColab. Semua hak dilindungi.</p>
    </div>
</body>
</html>
